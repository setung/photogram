spring:
  datasource:
    url: jdbc:tc:mysql:8.0:///photogram
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
  flyway:
    enabled: true
    table: post_schema_history
  sql:
    init:
      mode: always
      data-locations: classpath:sql/data/*.sql
