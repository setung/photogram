spring:
  cloud:
    gateway:
      routes:
        - id: user-service-public
          uri: lb://USER-SERVICE
          predicates:
            - Path=/user-service/users/signup, /user-service/users/emails/send-code, /user-service/users/login
            - Method=POST
          filters:
            - RemoveRequestHeader=Cookie
            - RewritePath=/user-service/(?<segment>.*), /$\{segment}
        - id: user-service-auth
          uri: lb://USER-SERVICE
          predicates:
            - Path=/user-service/users/**
            - Method=GET
          filters:
            - RemoveRequestHeader=Cookie
            - RewritePath=/user-service/(?<segment>.*), /$\{segment}
            - JwtAuthGatewayFilter